# https://gist.githubusercontent.com/jpodivin/7535915b58baab4e977af3bbccccf73c/raw/6584bc98c52cc46fd593127819bf6f33b69de4d6/compile_extraction_dataset.py
apiVersion: batch/v1
kind: CronJob
metadata:
  name: hf-upload-dataset
spec:
  schedule: "22 2 * * *"
  concurrencyPolicy: "Replace"
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            parent: "cronjob-dataset"
          name: hf-upload-dataset
        spec:
          containers:
          - name: upload-dataset
            image: quay.io/logdetective/website:latest
            imagePullPolicy: Always
            # for some reason we need to explicitly call the command like this -_-
            command: ["python3", "/usr/bin/compile_extraction_dataset.py"]
            env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-secret
                  key: token
            resources:
              requests:
                memory: "550Mi"
                cpu: "250m"
              limits:
                memory: "550Mi"
                cpu: "250m"
          restartPolicy: OnFailure
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: create-archive
spec:
  schedule: "45 23 * * *"
  concurrencyPolicy: "Replace"
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            parent: "cronjob-create-archive"
          name: create-archive
        spec:
          volumes:
            - name: persistent
              persistentVolumeClaim:
                claimName: persistent
          containers:
          - name: create-archive
            image: quay.io/sclorg/python-313-c10s:latest
            imagePullPolicy: Always
            command: ["python3", "/usr/bin/create_archive.py"]
            volumeMounts:
              - name: persistent
                mountPath: /persistent
            env:
            - name: FEEDBACK_DIR
              value: /persistent/results
            - name: REVIEWS_DIR
              value: /persistent/reviews
            resources:
              requests:
                memory: "200Mi"
                cpu: "100m"
              limits:
                memory: "500Mi"
                cpu: "500m"
          restartPolicy: OnFailure
